<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="30" fill="#0d1117"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#3eff3e" stroke-width="2" opacity="0.5"/>

  <!-- Radar rings -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#3eff3e" stroke-width="0.8" opacity="0.25"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#3eff3e" stroke-width="0.8" opacity="0.2"/>

  <!-- Radar crosshairs -->
  <line x1="32" y1="2" x2="32" y2="62" stroke="#3eff3e" stroke-width="0.6" opacity="0.2"/>
  <line x1="2" y1="32" x2="62" y2="32" stroke="#3eff3e" stroke-width="0.6" opacity="0.2"/>

  <!-- Radar blips -->
  <circle cx="14" cy="18" r="2" fill="#3eff3e" opacity="0.5"/>
  <circle cx="50" cy="44" r="1.5" fill="#3eff3e" opacity="0.35"/>
  <circle cx="22" cy="48" r="1.5" fill="#3eff3e" opacity="0.4"/>

  <!-- Rune med helm (actual OSRS sprite, centered) -->
  <image href="data:image/png;base64," x="10" y="8" width="44" height="48" image-rendering="pixelated"/>
</svg>
